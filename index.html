<script src="https://player.vimeo.com/api/player.js"></script>

<script>
(function() {
  let reproductor = null;

  function inicializarVimeo() {
    const visor = document.getElementById('ma-visor-vimeo');
    
    if (visor && !reproductor) {
      const idInicial = visor.getAttribute('data-id-video');
      reproductor = new Vimeo.Player('ma-visor-vimeo', {
        id: idInicial,
        controls: true,
        responsive: true
      });
    }
  }

  document.addEventListener('click', function(evento) {
    const contenedorPill = evento.target.closest('.ma-pill-btn');
    
    if (!contenedorPill) return; 

    // Lógica para botones bloqueados (Pro)
    if (contenedorPill.classList.contains('ma-locked')) {
      const urlDestino = contenedorPill.getAttribute('data-url-redirect');
      
      if (urlDestino) {
        // ✅ Cambio aplicado: Abre la URL en una nueva pestaña
        window.open(urlDestino, '_blank'); 
      }
      return; 
    }

    if (!reproductor) {
      inicializarVimeo(); 
    }

    if (reproductor) {
      const nuevoId = contenedorPill.getAttribute('data-id-video');
      if (nuevoId) {
        reproductor.loadVideo(nuevoId).then(() => {
          reproductor.play();
        }).catch((error) => {
          console.error("Error al cargar el video de Vimeo:", error);
        });

        const todosLosBotones = document.querySelectorAll('.ma-pill-btn');
        todosLosBotones.forEach(btn => btn.classList.remove('activo'));
        contenedorPill.classList.add('activo');
      }
    }
  });

  const observador = new MutationObserver((mutations) => {
    const visor = document.getElementById('ma-visor-vimeo');
    
    if (visor && !reproductor) {
      inicializarVimeo();
    } else if (!visor && reproductor) {
      reproductor = null; 
    }
  });

  observador.observe(document.body, { childList: true, subtree: true });

  inicializarVimeo();
})();

  // Añade esto en el script de la página que va dentro del iframe
window.addEventListener('load', function() {
    const altura = document.documentElement.scrollHeight;
    // Envía la altura al padre. El '*' permite cualquier origen, 
    // pero en producción deberías usar la URL exacta del padre.
    window.parent.postMessage({ tipo: 'ajusteAltura', valor: altura }, '*');
});

// Opcional: Re-calcular si la ventana cambia de tamaño
window.addEventListener('resize', function() {
    const altura = document.documentElement.scrollHeight;
    window.parent.postMessage({ tipo: 'ajusteAltura', valor: altura }, '*');
});
</script>
